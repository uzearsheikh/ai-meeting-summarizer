<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Give Feedback</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#667eea,#764ba2);

}

/* container */

.container{

width:400px;

background:white;

padding:40px;

border-radius:15px;

box-shadow:0 20px 40px rgba(0,0,0,0.2);

transition:0.4s;

}

.container:hover{

transform:translateY(-8px);

box-shadow:0 25px 50px rgba(0,0,0,0.3);

}

/* title */

h2{

text-align:center;

margin-bottom:25px;

}

/* input */

input,textarea{

width:100%;

padding:12px;

margin-bottom:15px;

border-radius:8px;

border:1px solid #ddd;

outline:none;

transition:0.3s;

}

/* input hover */

input:focus,textarea:focus{

border-color:#6366f1;

box-shadow:0 0 8px rgba(99,102,241,0.5);

}

/* rating */

.rating{

display:flex;

gap:8px;

margin-bottom:20px;

font-size:22px;

cursor:pointer;

}

.rating span{

transition:0.3s;

}

.rating span:hover{

transform:scale(1.4);

}

/* button */

button{

width:100%;

padding:12px;

border:none;

border-radius:8px;

background:linear-gradient(90deg,#6366f1,#8b5cf6);

color:white;

font-size:16px;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.05);

box-shadow:0 10px 25px rgba(0,0,0,0.2);

}

</style>

</head>

<body>

<div class="container">

<h2>Give Your Feedback</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="name" placeholder="Your Name">

<textarea name="message" placeholder="Write your feedback"></textarea>

<input type="number" name="rating" min="1" max="5" placeholder="Rating (1-5)">

<button type="submit">Submit Feedback</button>

</form>

</div>

</body>

</html>
